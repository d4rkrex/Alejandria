name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g., v1.6.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: |
          cargo build --release --target ${{ matrix.target }} \
            --package alejandria-cli --bin alejandria

      - name: Strip binary
        run: strip target/${{ matrix.target }}/release/alejandria

      - name: Create archive
        id: archive
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          ARCHIVE_NAME="alejandria-${VERSION}-${{ matrix.target }}"
          mkdir -p dist/${ARCHIVE_NAME}
          cp target/${{ matrix.target }}/release/alejandria dist/${ARCHIVE_NAME}/
          cp LICENSE-MIT LICENSE-APACHE README.md dist/${ARCHIVE_NAME}/
          cd dist
          tar czf ${ARCHIVE_NAME}.tar.gz ${ARCHIVE_NAME}
          sha256sum ${ARCHIVE_NAME}.tar.gz > ${ARCHIVE_NAME}.tar.gz.sha256
          echo "archive_name=${ARCHIVE_NAME}" >> $GITHUB_OUTPUT
          echo "archive_path=dist/${ARCHIVE_NAME}.tar.gz" >> $GITHUB_OUTPUT
          echo "checksum_path=dist/${ARCHIVE_NAME}.tar.gz.sha256" >> $GITHUB_OUTPUT

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.archive.outputs.archive_name }}
          path: |
            ${{ steps.archive.outputs.archive_path }}
            ${{ steps.archive.outputs.checksum_path }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate combined checksums
        run: |
          find artifacts -name "*.sha256" -exec cat {} \; > checksums.txt
          cat checksums.txt

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: Alejandria ${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: false
          make_latest: true
          body: |
            ## Alejandria ${{ steps.get_version.outputs.version }}

            Pre-built binaries for Linux and macOS.

            ### Installation

            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install.sh | bash
            ```

            ### Checksums

            See `checksums.txt` asset for SHA256 verification.

            ### Supported Platforms

            | Platform | File |
            |----------|------|
            | Linux x86_64 | `alejandria-${{ steps.get_version.outputs.version }}-x86_64-unknown-linux-gnu.tar.gz` |
            | macOS Intel | `alejandria-${{ steps.get_version.outputs.version }}-x86_64-apple-darwin.tar.gz` |
            | macOS Apple Silicon | `alejandria-${{ steps.get_version.outputs.version }}-aarch64-apple-darwin.tar.gz` |
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.sha256
            checksums.txt
