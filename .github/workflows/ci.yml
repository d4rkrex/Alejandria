name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test Suite
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable, beta]
        exclude:
          # Reduce matrix: only test beta on Ubuntu
          - os: macos-latest
            rust: beta
          - os: windows-latest
            rust: beta

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cargo test --all-features --verbose

      - name: Run doctests
        run: cargo test --all-features --doc

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run security audit
        run: cargo audit

  build:
    name: Build Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release --all-features

      - name: Upload artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: alejandria-${{ runner.os }}
          path: target/release/alejandria

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: alejandria-${{ runner.os }}
          path: target/release/alejandria.exe

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    env:
      # Coverage threshold percentage (line coverage)
      # Override in Cargo.toml with [workspace.metadata.coverage]
      # Default: 70% if not specified
      COVERAGE_THRESHOLD: 70
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin

      # Generate coverage in multiple formats for reporting and enforcement
      # Html: Human-readable reports for developers
      # Lcov: IDE integration (VSCode, IntelliJ coverage plugins)
      # Xml: Codecov integration (existing functionality)
      - name: Generate coverage reports
        run: |
          cargo tarpaulin \
            --all-features \
            --out Html,Lcov,Xml \
            --output-dir target/coverage \
            --timeout 600 \
            --fail-under ${{ env.COVERAGE_THRESHOLD }}

      # Upload HTML reports as artifacts for developer review
      # Always runs even if threshold check fails (to show what's uncovered)
      - name: Upload coverage HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ github.run_id }}-${{ github.run_number }}${{ job.status == 'failure' && '-failed' || '' }}
          path: target/coverage/html/
          retention-days: 30

      # Maintain existing Codecov integration
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: target/coverage/cobertura.xml
          fail_ci_if_error: false

  # MCP client examples integration test - validates all 4 language clients
  # Tests Python, Node.js, Go, and Rust clients against local MCP server
  example-clients:
    name: Example Clients Integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.21'

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cache/pip
            ~/.npm
            ~/go/pkg/mod
          key: ${{ runner.os }}-example-clients-${{ hashFiles('**/Cargo.lock', '**/requirements.txt', '**/package-lock.json', '**/go.sum') }}

      - name: Make integration test script executable
        run: chmod +x examples/test_integration.sh

      - name: Run integration tests
        run: examples/test_integration.sh

  # Performance profiling job - generates CPU flamegraphs for performance analysis
  # Runs independently (no dependencies on other jobs)
  # Artifacts available for 30 days after run completion
  profiling:
    name: Performance Profiling
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Install cargo-flamegraph for generating interactive SVG flamegraphs
      - name: Install flamegraph
        run: cargo install flamegraph

      # Install perf for CPU sampling (Linux kernel profiler)
      # Note: Installs kernel-specific tools matching runner's kernel version
      - name: Install perf
        run: sudo apt-get update && sudo apt-get install -y linux-tools-common linux-tools-generic linux-tools-$(uname -r)

      # Profile all three benchmark groups (10-15 minutes)
      # Generates flamegraphs in target/profiling/ directory
      - name: Run profiling
        run: ./scripts/profiling/profile-benchmarks.sh ./target/profiling

      # Upload flamegraphs as artifacts (even if profiling fails - helps debugging)
      # Download from Actions UI after job completes
      - name: Upload profiling artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: profiling-flamegraphs-${{ github.run_id }}
          path: target/profiling/
          retention-days: 30
