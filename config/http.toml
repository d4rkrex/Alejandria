# Alejandria HTTP Transport Configuration
# Example configuration for HTTP mode deployment

# Database path
db_path = "/var/lib/alejandria/alejandria.db"

[http]
enabled = true
bind = "0.0.0.0:8080"  # Listen on all interfaces

# Connection limits (from design.md)
max_connections_per_key = 10
max_connections_per_ip = 50
max_connections_global = 1000

# Timeouts
session_timeout_secs = 3600  # 1 hour
request_timeout_secs = 30

[http.tls]
enabled = false
cert_path = "/etc/alejandria/tls/cert.pem"
key_path = "/etc/alejandria/tls/key.pem"

[http.rate_limit]
requests_per_minute = 100
burst_size = 20

[http.cors]
# SECURITY: CORS Configuration
# 
# CRITICAL: Never use wildcard ["*"] in production!
# List all trusted origins explicitly.
#
# Production example:
# allowed_origins = [
#     "https://your-server.example.com",
#     "https://admin.example.com"
# ]
#
# Development note:
# If allowed_origins is empty and environment is "development",
# the server will allow all origins for easier local testing.
# This behavior is AUTOMATICALLY DISABLED in production mode.
#
# To enable CORS, set environment variables:
#   export ALEJANDRIA_CORS_ENABLED=true
#   export ALEJANDRIA_CORS_ORIGINS="https://your-server.example.com,https://admin.example.com"
#
# For production deployment, you MUST:
# 1. Set ALEJANDRIA_ENV=production
# 2. Provide specific HTTPS origins (no wildcards)
# 3. Never use http:// origins (except localhost for testing)
allowed_origins = []

[auth]
# API keys: Plain text keys (hashed internally with SHA-256)
# For production, use strong random keys:
# openssl rand -base64 32
api_keys = [
    { name = "veritran-appsec", key = "your-api-key-here" },
]

[database]
# Enable SQLCipher encryption (requires encryption feature)
encryption_enabled = false

# Hex-encoded 32-byte encryption key
# Generate with: openssl rand -hex 32
encryption_key = ""

[instance]
# Unique instance ID for multi-tenant isolation
# IMPORTANT: Each deployment must have a unique ID
instance_id = "8d7ac804-5808-48cf-8561-141bdf58bbe6"
