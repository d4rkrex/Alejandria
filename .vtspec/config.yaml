version: "0.1"
project:
  name: Alejandria
  description: "Alejandria: Persistent memory system for AI agents via MCP. Rust
    workspace with SQLite backend, hybrid search (BM25+vector), and dual-memory
    architecture (episodic memories + semantic knowledge graphs)."
  stack: Rust 2021, SQLite, MCP Protocol
  conventions:
    - Cargo workspace with 4 crates (core, storage, mcp, cli)
    - Use tracing for logging
    - WAL mode for SQLite
    - Trait-based abstraction for extensibility
    - Feature flags for optional functionality
    - Comprehensive test coverage (>70%)
    - Error handling with anyhow/thiserror
security:
  posture: elevated
memory:
  backend: alejandria
