# Reusable Nginx location blocks for Alejandria endpoints
# Include this file in each team's server block

# JSON-RPC endpoint
location /rpc {
    proxy_pass http://alejandria_backend/rpc;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    
    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Body size limit (1MB for JSON-RPC requests)
    client_max_body_size 1M;
}

# Server-Sent Events (SSE) endpoint
location /events {
    proxy_pass http://alejandria_backend/events;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    # SSE-specific configuration
    proxy_buffering off;
    proxy_cache off;
    chunked_transfer_encoding on;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    # Disable rate limiting for SSE (long-lived connections)
    limit_req off;
}

# Health check endpoint
location /health {
    proxy_pass http://alejandria_backend/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    access_log off;
}

# Block all other paths
location / {
    return 404;
}
