# Nginx Reverse Proxy Configuration for Alejandria HTTP Transport
# Multi-Team Isolation Pattern

# Rate limiting zones (global and per-IP)
limit_req_zone $binary_remote_addr zone=alejandria_global:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=alejandria_ip:10m rate=50r/m;

# Upstream backend (local Alejandria instance)
upstream alejandria_backend {
    server 127.0.0.1:8080 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# Team A - Security Team
server {
    listen 443 ssl http2;
    server_name security-team.alejandria.example.com;

    # TLS Configuration (modern ciphers only)
    ssl_certificate /etc/letsencrypt/live/security-team.alejandria.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/security-team.alejandria.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer" always;

    # Rate limiting (burst allows temporary spikes)
    limit_req zone=alejandria_global burst=20 nodelay;
    limit_req zone=alejandria_ip burst=10 nodelay;

    # Logging
    access_log /var/log/nginx/alejandria-security-team-access.log;
    error_log /var/log/nginx/alejandria-security-team-error.log warn;

    # JSON-RPC endpoint
    location /rpc {
        proxy_pass http://alejandria_backend/rpc;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Body size limit (1MB for JSON-RPC requests)
        client_max_body_size 1M;
    }

    # Server-Sent Events (SSE) endpoint
    location /events {
        proxy_pass http://alejandria_backend/events;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # SSE-specific configuration
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # Disable rate limiting for SSE (long-lived connections)
        limit_req off;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://alejandria_backend/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # Block all other paths
    location / {
        return 404;
    }
}

# Team B - Development Team
server {
    listen 443 ssl http2;
    server_name dev-team.alejandria.example.com;

    # TLS Configuration (same as Team A)
    ssl_certificate /etc/letsencrypt/live/dev-team.alejandria.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev-team.alejandria.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security Headers (same as Team A)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer" always;

    # Rate limiting
    limit_req zone=alejandria_global burst=20 nodelay;
    limit_req zone=alejandria_ip burst=10 nodelay;

    # Logging
    access_log /var/log/nginx/alejandria-dev-team-access.log;
    error_log /var/log/nginx/alejandria-dev-team-error.log warn;

    # Same location blocks as Team A (omitted for brevity - use same config)
    include /etc/nginx/snippets/alejandria-locations.conf;
}

# HTTP to HTTPS redirect
server {
    listen 80;
    server_name security-team.alejandria.example.com dev-team.alejandria.example.com;
    return 301 https://$server_name$request_uri;
}
