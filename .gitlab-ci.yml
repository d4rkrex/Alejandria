stages:
  - build
  - release

variables:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"
  CARGO_HOME: $CI_PROJECT_DIR/.cargo

# Build binary for development/main (not release archives)
build:dev:
  stage: build
  image: rust:latest
  cache:
    key:
      files:
        - Cargo.lock
      prefix: dev-build
    paths:
      - .cargo/registry
      - .cargo/git
      - target
  script:
    - echo "Building development binary for x86_64-unknown-linux-gnu"
    - cargo build --release --features embeddings --package alejandria-cli --bin alejandria
    - mkdir -p bin
    - cp target/release/alejandria bin/alejandria-linux-x86_64
    - sha256sum bin/alejandria-linux-x86_64 > bin/alejandria-linux-x86_64.sha256
    - echo "Version info:"
    - bin/alejandria-linux-x86_64 --version
  artifacts:
    name: "${CI_PROJECT_NAME}-${CI_COMMIT_SHORT_SHA}"
    paths:
      - bin/alejandria-linux-x86_64
      - bin/alejandria-linux-x86_64.sha256
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG
  tags:
    - appsec

# Cache configuration for Rust builds
.cache_template: &cache_template
  key:
    files:
      - Cargo.lock
    prefix: $CI_JOB_NAME
  paths:
    - .cargo/registry
    - .cargo/git
    - target

# Build jobs for each platform
.build_template: &build_template
  stage: build
  image: rust:latest
  cache:
    <<: *cache_template
  before_script:
    - rustup target add $BUILD_TARGET
    - apt-get update && apt-get install -y curl tar gzip coreutils
  script:
    - echo "Building for $BUILD_TARGET"
    - cargo build --release --target $BUILD_TARGET --features embeddings --package alejandria-cli --bin alejandria
    # Strip binary
    - strip target/$BUILD_TARGET/release/alejandria || true
    # Create archive
    - VERSION=${CI_COMMIT_TAG}
    - ARCHIVE_NAME="alejandria-${VERSION}-${BUILD_TARGET}"
    - mkdir -p dist/${ARCHIVE_NAME}
    - cp target/$BUILD_TARGET/release/alejandria dist/${ARCHIVE_NAME}/
    - cp LICENSE-MIT LICENSE-APACHE README.md dist/${ARCHIVE_NAME}/
    - cd dist
    - tar czf ${ARCHIVE_NAME}.tar.gz ${ARCHIVE_NAME}
    - sha256sum ${ARCHIVE_NAME}.tar.gz > ${ARCHIVE_NAME}.tar.gz.sha256
    - cd ..
  artifacts:
    name: "${CI_PROJECT_NAME}-${CI_COMMIT_TAG}-${BUILD_TARGET}"
    paths:
      - dist/*.tar.gz
      - dist/*.sha256
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_TAG =~ /^v.*/

build:linux-x86_64:
  <<: *build_template
  tags:
    - appsec
  variables:
    BUILD_TARGET: x86_64-unknown-linux-gnu

build:macos-intel:
  <<: *build_template
  tags:
    - macos
    - x86_64
  image: null  # No Docker on macOS runners
  before_script:
    - rustup target add $BUILD_TARGET
  variables:
    BUILD_TARGET: x86_64-apple-darwin

build:macos-arm:
  <<: *build_template
  tags:
    - macos
    - arm64
  image: null  # No Docker on macOS runners
  before_script:
    - rustup target add $BUILD_TARGET
  variables:
    BUILD_TARGET: aarch64-apple-darwin

# Generate combined checksums file
generate_checksums:
  stage: release
  image: alpine:latest
  needs:
    - build:linux-x86_64
    - build:macos-intel
    - build:macos-arm
  before_script:
    - apk add --no-cache findutils coreutils
  script:
    - find dist -name "*.sha256" -exec cat {} \; > checksums.txt
    - cat checksums.txt
  artifacts:
    paths:
      - checksums.txt
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_TAG =~ /^v.*/

# Create GitLab Release with assets
create_release:
  stage: release
  image: alpine:latest
  needs:
    - build:linux-x86_64
    - build:macos-intel
    - build:macos-arm
    - generate_checksums
  before_script:
    - apk add --no-cache curl jq
  script:
    - |
      # Prepare release description
      RELEASE_DESCRIPTION="## Alejandria ${CI_COMMIT_TAG}

      Pre-built binaries for Linux and macOS.

      ### Installation

      \`\`\`bash
      curl -fsSL https://gitlab.veritran.net/appsec/alejandria/-/raw/main/scripts/install-mcp-v4.sh | bash
      \`\`\`

      ### Checksums

      See \`checksums.txt\` asset for SHA256 verification.

      ### Supported Platforms

      - Linux x86_64
      - macOS Intel (x86_64)
      - macOS Apple Silicon (ARM64)"
      
      # Create release using GitLab API
      RELEASE_PAYLOAD=$(jq -n \
        --arg tag "$CI_COMMIT_TAG" \
        --arg name "Alejandria $CI_COMMIT_TAG" \
        --arg desc "$RELEASE_DESCRIPTION" \
        '{
          tag_name: $tag,
          name: $name,
          description: $desc
        }')
      
      curl --fail --request POST \
        --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        --header "Content-Type: application/json" \
        --data "$RELEASE_PAYLOAD" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases"
      
      # Upload release assets
      for file in dist/*.tar.gz dist/*.sha256 checksums.txt; do
        if [ -f "$file" ]; then
          filename=$(basename "$file")
          echo "Uploading $filename..."
          
          # Upload to Package Registry (Generic Packages)
          curl --fail --request PUT \
            --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
            --upload-file "$file" \
            "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/alejandria/${CI_COMMIT_TAG}/${filename}"
          
          # Link asset to release
          ASSET_PAYLOAD=$(jq -n \
            --arg name "$filename" \
            --arg url "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/alejandria/${CI_COMMIT_TAG}/${filename}" \
            '{
              name: $name,
              url: $url,
              link_type: "package"
            }')
          
          curl --fail --request POST \
            --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
            --header "Content-Type: application/json" \
            --data "$ASSET_PAYLOAD" \
            "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases/${CI_COMMIT_TAG}/assets/links"
        fi
      done
      
      echo "Release ${CI_COMMIT_TAG} created successfully!"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v.*/
